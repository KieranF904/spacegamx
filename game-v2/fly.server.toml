app = 'spacegame-v2-server'
primary_region = 'syd'

[build]
  dockerfile = "server/Dockerfile"

[env]
  PORT = "3000"
  ADMIN_PORT = "3001"
  NODE_ENV = "production"
  SERVER_NAME = "Space Game v2 (Australia)"
  SERVER_REGION = "syd"
  BROWSER_URL = "https://spacegame-v2.fly.dev"
  PUBLIC_HOST = "spacegame-v2-server.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ['app']

[[services]]
  internal_port = 3001
  protocol = "tcp"

  [[services.ports]]
    port = 3001
    handlers = ["tls", "http"]

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
