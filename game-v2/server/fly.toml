app = 'spacegame-v2-server'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"
  ignorefile = ".dockerignore"

[env]
  PORT = "3000"
  ADMIN_PORT = "3001"
  NODE_ENV = "production"
  SERVER_NAME = "Space Game v2 (US East)"
  SERVER_REGION = "iad"
  BROWSER_URL = "https://spacegame-v2.fly.dev"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
